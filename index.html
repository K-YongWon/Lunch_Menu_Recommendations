<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점메추 - 오늘의 점심 추천</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-2: #f4f6f9;
      --text: #111827;
      --text-soft: #374151;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --border: #e5e7eb;
      --border-strong: #d1d5db;

      --primary: #2BA8D6;
      --primary-hover: #1F8FBD;
      --primary-soft: #EAF6FC;

      --accent: #EB5022;
      --accent-hover: #CC3F15;
      --accent-soft: #FCEAE3;

      --car: #2BA8D6;
      --car-soft: #EAF6FC;
      --friday: #0d9488;
      --friday-soft: #ccfbf1;

      --danger: #ef4444;
      --success: #10b981;

      --shadow-sm: 0 1px 2px rgba(17, 24, 39, 0.04);
      --shadow-md: 0 4px 12px rgba(17, 24, 39, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
                   "Malgun Gothic", "Noto Sans KR", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 18px;
    }

    header h1 {
      font-size: 32px;
      margin: 0 0 8px;
      letter-spacing: -0.8px;
      color: var(--text);
      font-weight: 900;
    }

    header h1 .blue { color: var(--primary); }
    header h1 .orange { color: var(--accent); }

    header p {
      color: var(--muted);
      margin: 0;
      font-size: 14px;
    }

    .sync-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted-2);
      transition: background 0.2s;
    }

    .sync-bar[data-status="syncing"] .sync-dot {
      background: var(--primary);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .sync-bar[data-status="ok"] .sync-dot { background: var(--success); }
    .sync-bar[data-status="error"] .sync-dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .sync-bar button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sync-bar button:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    .sync-bar button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }

    .card-title {
      margin-bottom: 18px;
    }

    .card-title h2 {
      font-size: 17px;
      margin: 0 0 4px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .card-title .subtitle {
      font-size: 12.5px;
      color: var(--muted);
      margin: 0;
      font-weight: 400;
      line-height: 1.4;
    }

    .section-label {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 8px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    .mode-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 12px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      text-align: left;
    }

    .mode-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      box-shadow: 0 4px 10px rgba(235, 80, 34, 0.28);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.15);
    }

    .mode-btn .mode-title { display: block; font-weight: 600; margin-bottom: 2px; }
    .mode-btn .mode-desc { display: block; font-size: 11px; opacity: 0.85; }
    .mode-btn.active .mode-title { font-weight: 800; }
    .mode-btn.active .mode-desc { opacity: 0.95; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .filter-chip {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .filter-chip:hover:not(.active) {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-chip.active {
      background: var(--primary-soft);
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-chip .check {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid currentColor;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
    }

    .filter-chip.active .check {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .filter-chip.active .check::before {
      content: "v";
      font-weight: 900;
    }

    .filter-chip.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    .candidate-info {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .candidate-info strong {
      color: var(--primary);
      font-weight: 700;
    }

    .pick-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
      box-shadow: 0 4px 12px rgba(235, 80, 34, 0.3);
      letter-spacing: 0.5px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    .pick-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 6px 16px rgba(235, 80, 34, 0.35);
    }
    .pick-btn:active:not(:disabled) { transform: scale(0.98); }
    .pick-btn:disabled {
      background: var(--panel-2);
      color: var(--muted-2);
      cursor: not-allowed;
      box-shadow: none;
      text-shadow: none;
    }

    .result {
      margin-top: 18px;
      padding: 24px;
      background: linear-gradient(135deg, #1F8FBD 0%, #F47A21 100%);
      border-radius: 12px;
      text-align: center;
      display: none;
      box-shadow: 0 10px 30px rgba(235, 80, 34, 0.3);
      color: white;
    }

    .result.show { display: block; animation: pop 0.3s ease-out; }

    @keyframes pop {
      0% { transform: scale(0.92); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .result .label {
      font-size: 12px;
      opacity: 0.95;
      margin-bottom: 6px;
      letter-spacing: 0.8px;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    .result .name {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.22);
    }

    .result .meta {
      font-size: 13px;
      opacity: 0.95;
      font-weight: 500;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
    }

    .result-actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .result-actions button {
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent);
      border: 1px solid rgba(255, 255, 255, 0.92);
      padding: 9px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s, transform 0.05s;
    }

    .result-actions button:hover {
      background: white;
      transform: translateY(-1px);
    }

    .result-actions button:active { transform: translateY(0); }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .add-form input[type="text"] {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 13px;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .add-form input[type="text"]::placeholder { color: var(--muted-2); }

    .add-form input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .add-form button {
      background: var(--text);
      border: 1px solid var(--text);
      color: white;
      padding: 11px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .add-form button:hover {
      background: var(--text-soft);
      border-color: var(--text-soft);
    }

    .add-form button:disabled {
      background: var(--muted-2);
      border-color: var(--muted-2);
      cursor: not-allowed;
    }

    .restaurant-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 480px;
      overflow-y: auto;
    }

    .restaurant-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--panel-2);
      border: 1px solid transparent;
      border-radius: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
      transition: background 0.15s;
    }

    .restaurant-item:hover {
      background: var(--panel);
      border-color: var(--border);
    }

    .restaurant-item .name-wrap {
      flex: 1;
      min-width: 120px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 7px;
      border-radius: 6px;
      color: white;
      flex-shrink: 0;
      min-width: 20px;
      text-align: center;
      letter-spacing: -0.2px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .rank-1 { background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 100%); }
    .rank-2 { background: linear-gradient(135deg, #6B7280 0%, #9CA3AF 100%); }
    .rank-3 { background: linear-gradient(135deg, #92400E 0%, #B45309 100%); }

    .restaurant-item .name {
      font-size: 14px;
      font-weight: 500;
      cursor: text;
      padding: 4px 6px;
      border-radius: 4px;
      border: 1px solid transparent;
      outline: none;
      min-width: 60px;
      color: var(--text);
    }

    .restaurant-item .name:hover {
      border-color: var(--border-strong);
      background: var(--panel);
    }

    .restaurant-item .name:focus {
      border-color: var(--primary);
      background: var(--panel);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .tag-toggles {
      display: flex;
      gap: 4px;
    }

    .tag-toggle {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 9px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
    }

    .tag-toggle:hover:not(.active) {
      border-color: var(--border-strong);
      color: var(--text-soft);
    }

    .tag-toggle.car.active {
      background: var(--car-soft);
      border-color: var(--car);
      color: var(--car);
    }

    .tag-toggle.friday.active {
      background: var(--friday-soft);
      border-color: var(--friday);
      color: var(--friday);
    }

    .restaurant-item .count {
      font-size: 12px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 6px;
      min-width: 64px;
      text-align: center;
      font-weight: 500;
    }

    .restaurant-item .actions { display: flex; gap: 4px; }

    .restaurant-item .actions button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      font-weight: 700;
      transition: all 0.15s;
    }

    .restaurant-item .actions button:hover {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .restaurant-item .delete:hover {
      border-color: var(--danger) !important;
      color: var(--danger) !important;
      background: #fef2f2 !important;
    }

    .restaurant-item.filtered-out { opacity: 0.55; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 24px;
      font-size: 14px;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .footer-actions button {
      flex: 1;
      min-width: 120px;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .footer-actions button:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .toast-stack {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
      max-width: 320px;
      pointer-events: none;
    }

    .toast {
      background: var(--text);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      animation: toast-in 0.25s ease-out;
      pointer-events: auto;
      max-width: 100%;
      word-break: keep-all;
    }

    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(2px);
    }

    .loading-overlay.show { display: flex; }

    .loading-overlay .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      body { padding: 16px 12px; }
      .container { max-width: 100%; }
      header { margin-bottom: 14px; }
      header h1 { font-size: 28px; }
      header p { font-size: 13px; }
      .sync-bar { margin-bottom: 18px; }
      .card { padding: 18px 16px; border-radius: 14px; margin-bottom: 16px; }
      .modes { grid-template-columns: 1fr; }
      .mode-btn { padding: 12px 14px; }
      .pick-btn { padding: 16px; font-size: 17px; }
      .result { padding: 22px 18px; }
      .result .name { font-size: 24px; }
      .add-form input[type="text"] { font-size: 16px; }
      .restaurant-item { padding: 10px; gap: 6px; }
      .restaurant-item .name-wrap { flex: 1 1 100%; min-width: 0; margin-bottom: 2px; }
      .restaurant-item .name { font-size: 16px; }
      .restaurant-item .count { font-size: 11px; min-width: 58px; padding: 4px 6px; }
      .restaurant-item .actions button { width: 32px; height: 32px; }
      .tag-toggle { padding: 5px 10px; font-size: 12px; }
      .footer-actions button { min-width: 100px; font-size: 11px; }
    }

    @media (max-width: 380px) {
      .filter-row { gap: 6px; }
      .filter-chip { flex: 1 1 100%; justify-content: center; padding: 10px 14px; }
      .restaurant-item { justify-content: space-between; }
      .restaurant-item .tag-toggles { flex: 1 1 auto; }
      .footer-actions button { flex: 1 1 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span class="blue">점</span><span class="orange">메</span><span class="blue">추</span></h1>
      <p>💁‍♀️ 저희 오늘 뭐 먹을까요↗︎↗︎↗︎?</p>
    </header>

    <div class="sync-bar" id="syncBar" data-status="idle">
      <span class="sync-dot"></span>
      <span id="syncText">초기화 중...</span>
      <button id="syncBtn" type="button">새로고침</button>
    </div>

    <section class="card">
      <div class="card-title">
        <h2>옵션</h2>
        <p class="subtitle">추첨 방식과 필터를 설정해 오늘의 점심을 추천받아봅시다</p>
      </div>

      <p class="section-label">추첨 방식 (단일 선택)</p>
      <div class="modes" id="modes">
        <button class="mode-btn active" data-mode="balanced">
          <span class="mode-title">균형</span>
          <span class="mode-desc">너무 자주 간 곳은 살짝 줄임</span>
        </button>
        <button class="mode-btn" data-mode="frequent">
          <span class="mode-title">자주 간 곳 우선</span>
          <span class="mode-desc">익숙한 곳이 제일</span>
        </button>
        <button class="mode-btn" data-mode="rare">
          <span class="mode-title">안 간 곳 우선</span>
          <span class="mode-desc">잊혀지기 전에</span>
        </button>
        <button class="mode-btn" data-mode="random">
          <span class="mode-title">완전 랜덤</span>
          <span class="mode-desc">모든 식당 동일 확률</span>
        </button>
      </div>

      <p class="section-label">필터 (다중 선택)</p>
      <div class="filter-row" id="filters">
        <button class="filter-chip" data-filter="allowCar">
          <span class="check"></span>차량 이용 가능
        </button>
        <button class="filter-chip disabled" data-filter="carOnly" id="carOnlyFilter" disabled>
          <span class="check"></span>차량 전용
        </button>
        <button class="filter-chip" data-filter="todayIsFriday">
          <span class="check"></span>오늘은 금요일
        </button>
      </div>

      <div class="candidate-info" id="candidateInfo"></div>

      <button class="pick-btn" id="pickBtn">점메추!</button>

      <div class="result" id="result">
        <div class="label">오늘의 추천</div>
        <div class="name" id="resultName"></div>
        <div class="meta" id="resultMeta"></div>
        <div class="result-actions">
          <button id="acceptBtn">고고! 구리구리! (방문 +1)</button>
          <button id="rerollBtn">비겁하지만 다시 뽑기</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">
        <h2>식당 목록</h2>
        <p class="subtitle">식당 추가·삭제는 페이지에서, 방문 횟수는 추천 확정 시에만 반영됩니다</p>
      </div>
      <div class="add-form">
        <input type="text" id="newName" placeholder="식당 이름 입력" maxlength="30" />
        <button id="addBtn">추가</button>
      </div>
      <ul class="restaurant-list" id="list"></ul>

      <div class="footer-actions">
        <button id="exportBtn">데이터 내보내기</button>
      </div>
    </section>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const API_URL = "https://script.google.com/macros/s/AKfycbzaDLPTfLcHinrbZcSgcKNArCpCaGt8lXt33zjJxMJx06FYCJX9U49qZVIzAwzBEWkAXw/exec";
    const POLL_INTERVAL_MS = 5 * 60 * 1000;
    const PREFS_KEY = "lunch-picker-prefs-v1";
    const LEGACY_STORAGE_KEYS = ["lunch-picker-data-v2", "lunch-picker-data-v1"];

    // ============================================================
    // STATE
    // ============================================================
    const DEFAULT_FILTERS = {
      allowCar: false,
      carOnly: false,
      todayIsFriday: false,
    };

    let state = {
      mode: "balanced",
      filters: { ...DEFAULT_FILTERS },
      restaurants: [],
      lastPickId: null,
      lastSyncAt: null,
      syncStatus: "idle",
    };

    // ============================================================
    // PREFERENCES (localStorage, per-user)
    // ============================================================
    function loadPrefs() {
      try {
        const raw = localStorage.getItem(PREFS_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed.mode) state.mode = parsed.mode;
        if (parsed.filters) {
          const f = parsed.filters;
          state.filters = { ...DEFAULT_FILTERS };
          if ("allowCar" in f) state.filters.allowCar = !!f.allowCar;
          if ("carOnly" in f) state.filters.carOnly = !!f.carOnly;
          if ("excludePapa" in f) state.filters.todayIsFriday = !f.excludePapa;
          if ("todayIsFriday" in f) state.filters.todayIsFriday = !!f.todayIsFriday;
          if (!state.filters.allowCar) state.filters.carOnly = false;
        }
      } catch (e) {
        console.warn("Failed to load prefs", e);
      }
    }

    function savePrefs() {
      localStorage.setItem(PREFS_KEY, JSON.stringify({
        mode: state.mode,
        filters: state.filters,
      }));
    }

    // ============================================================
    // API
    // ============================================================
    async function apiGet() {
      const res = await fetch(API_URL, { method: "GET" });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || "API error");
      return json.data;
    }

    async function apiPost(body) {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(body),
        headers: { "Content-Type": "text/plain;charset=utf-8" },
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || "API error");
      return json.data;
    }

    function normalizeRestaurant(r) {
      return {
        id: String(r.id || ""),
        name: String(r.name || "").trim(),
        count: Math.max(0, Number(r.count) || 0),
        needsCar: Boolean(r.needsCar),
        isFridayOnly: Boolean(r.isFridayOnly),
      };
    }

    // ============================================================
    // SYNC
    // ============================================================
    function setSyncStatus(status, text) {
      state.syncStatus = status;
      const bar = document.getElementById("syncBar");
      const textEl = document.getElementById("syncText");
      bar.dataset.status = status;
      textEl.textContent = text;
    }

    function relativeTime(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 5) return "방금 동기화됨";
      if (diff < 60) return `${diff}초 전 동기화`;
      const min = Math.floor(diff / 60);
      if (min < 60) return `${min}분 전 동기화`;
      const hr = Math.floor(min / 60);
      return `${hr}시간 전 동기화`;
    }

    function refreshSyncLabel() {
      if (state.syncStatus !== "ok" || !state.lastSyncAt) return;
      document.getElementById("syncText").textContent = relativeTime(state.lastSyncAt);
    }

    async function fetchFromSheet(opts = {}) {
      const showLoader = opts.showLoader !== false;
      if (showLoader) showLoading(true);
      setSyncStatus("syncing", "동기화 중...");

      try {
        const data = await apiGet();
        state.restaurants = data.map(normalizeRestaurant);
        state.lastSyncAt = Date.now();
        setSyncStatus("ok", "방금 동기화됨");
        renderAll();
        await maybeMigrateLegacyData();
      } catch (err) {
        console.error(err);
        setSyncStatus("error", "동기화 실패");
        showToast("시트에서 데이터를 가져오지 못했습니다. 새로고침을 눌러보세요.", "error");
      } finally {
        if (showLoader) showLoading(false);
      }
    }

    async function maybeMigrateLegacyData() {
      if (state.restaurants.length > 0) return;
      let legacyData = null;
      for (const key of LEGACY_STORAGE_KEYS) {
        const raw = localStorage.getItem(key);
        if (!raw) continue;
        try {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed.restaurants) && parsed.restaurants.length > 0) {
            legacyData = parsed.restaurants;
            break;
          }
        } catch {}
      }
      if (!legacyData) return;

      const ok = confirm(
        `예전에 브라우저에 저장된 식당 ${legacyData.length}개가 있습니다.\n시트로 옮길까요?\n(시트가 비어 있을 때만 옮겨집니다)`
      );
      if (!ok) return;

      showLoading(true);
      try {
        const restaurants = legacyData.map(normalizeRestaurant).filter(r => r.name);
        const result = await apiPost({ action: "replace", restaurants });
        state.restaurants = result.map(normalizeRestaurant);
        state.lastSyncAt = Date.now();
        setSyncStatus("ok", "방금 동기화됨");
        renderAll();
        LEGACY_STORAGE_KEYS.forEach(k => localStorage.removeItem(k));
        showToast(`${restaurants.length}개의 식당을 시트로 옮겼습니다.`, "success");
      } catch (err) {
        console.error(err);
        showToast("이전 데이터 이전에 실패했습니다.", "error");
      } finally {
        showLoading(false);
      }
    }

    let pollTimer = null;
    function startPolling() {
      stopPolling();
      pollTimer = setInterval(() => {
        if (document.hidden) return;
        fetchFromSheet({ showLoader: false });
      }, POLL_INTERVAL_MS);
    }
    function stopPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }

    setInterval(refreshSyncLabel, 30 * 1000);

    // ============================================================
    // RECOMMENDATION
    // ============================================================
    function getCandidates() {
      return state.restaurants.filter(r => {
        if (!state.filters.todayIsFriday && r.isFridayOnly) return false;

        if (!state.filters.allowCar) {
          if (r.needsCar) return false;
          return true;
        }

        if (state.filters.carOnly && !r.needsCar) return false;
        return true;
      });
    }

    function calculateWeights(mode, restaurants) {
      if (restaurants.length === 0) return [];
      const counts = restaurants.map(r => r.count);
      const maxCount = Math.max(...counts, 1);

      return restaurants.map(r => {
        switch (mode) {
          case "random":   return 1;
          case "frequent": return Math.pow(r.count + 1, 1.5);
          case "rare":     return Math.pow(maxCount - r.count + 1, 1.5);
          case "balanced":
          default:         return 1 / Math.sqrt(r.count + 1);
        }
      });
    }

    function pickRestaurant() {
      const candidates = getCandidates();
      if (candidates.length === 0) return null;

      const weights = calculateWeights(state.mode, candidates);
      const total = weights.reduce((a, b) => a + b, 0);
      if (total <= 0) return candidates[0];

      let pick = Math.random() * total;
      for (let i = 0; i < candidates.length; i++) {
        pick -= weights[i];
        if (pick <= 0) return candidates[i];
      }
      return candidates[candidates.length - 1];
    }

    function modeLabel(mode) {
      return ({
        balanced: "균형",
        frequent: "자주 간 곳 우선",
        rare:     "안 간 곳 우선",
        random:   "완전 랜덤",
      })[mode] || mode;
    }

    function filterSummary() {
      const parts = [];
      if (state.filters.allowCar) {
        parts.push(state.filters.carOnly ? "차량 전용" : "차량 가능");
      } else {
        parts.push("차량 X");
      }
      parts.push(state.filters.todayIsFriday ? "오늘은 금요일" : "금요일 전용 제외");
      return parts.join(" · ");
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderModes() {
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === state.mode);
      });
    }

    function renderFilters() {
      document.querySelectorAll(".filter-chip").forEach(btn => {
        const key = btn.dataset.filter;
        btn.classList.toggle("active", !!state.filters[key]);

        if (key === "carOnly") {
          const disabled = !state.filters.allowCar;
          btn.classList.toggle("disabled", disabled);
          btn.disabled = disabled;
        }
      });
    }

    function renderCandidateInfo() {
      const total = state.restaurants.length;
      const eligible = getCandidates().length;
      const info = document.getElementById("candidateInfo");
      info.innerHTML = `현재 후보: <strong>${eligible}곳</strong> / 전체 ${total}곳`;

      const pickBtn = document.getElementById("pickBtn");
      pickBtn.disabled = eligible === 0;
      pickBtn.textContent = eligible === 0 ? "추천할 식당이 없어요" : "점메추!";
    }

    function computeRanks(restaurants) {
      const visited = restaurants.filter(r => r.count > 0);
      const topCounts = [...new Set(visited.map(r => r.count))]
        .sort((a, b) => b - a)
        .slice(0, 3);

      const ranks = {};
      restaurants.forEach(r => {
        const idx = topCounts.indexOf(r.count);
        if (idx >= 0 && r.count > 0) ranks[r.id] = idx + 1;
      });
      return ranks;
    }

    function renderList() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      if (state.restaurants.length === 0) {
        list.innerHTML = '<li class="empty-state">식당을 추가해주세요</li>';
        return;
      }

      const candidateIds = new Set(getCandidates().map(r => r.id));
      const ranks = computeRanks(state.restaurants);
      const sorted = [...state.restaurants].sort((a, b) => b.count - a.count);

      sorted.forEach(r => {
        const li = document.createElement("li");
        li.className = "restaurant-item" + (candidateIds.has(r.id) ? "" : " filtered-out");
        li.dataset.id = r.id;
        const rank = ranks[r.id];
        const rankChip = rank ? `<span class="rank rank-${rank}">${rank}</span>` : "";
        li.innerHTML = `
          <div class="name-wrap">
            ${rankChip}
            <span class="name" contenteditable="true" spellcheck="false"></span>
          </div>
          <div class="tag-toggles">
            <button class="tag-toggle car ${r.needsCar ? "active" : ""}" data-tag="needsCar" title="차로 가야 함">차</button>
            <button class="tag-toggle friday ${r.isFridayOnly ? "active" : ""}" data-tag="isFridayOnly" title="금요일에만 갈 수 있음">금</button>
          </div>
          <span class="count">방문 ${r.count}회</span>
          <div class="actions">
            <button class="delete" title="삭제">x</button>
          </div>
        `;

        const nameEl = li.querySelector(".name");
        nameEl.textContent = r.name;

        nameEl.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); nameEl.blur(); }
          else if (e.key === "Escape") { e.preventDefault(); nameEl.textContent = r.name; nameEl.blur(); }
        });

        nameEl.addEventListener("blur", () => {
          renameRestaurant(r.id, nameEl.textContent);
        });

        li.querySelector(".tag-toggle.car").addEventListener("click", () => toggleTag(r.id, "needsCar"));
        li.querySelector(".tag-toggle.friday").addEventListener("click", () => toggleTag(r.id, "isFridayOnly"));
        li.querySelector(".delete").addEventListener("click", () => deleteRestaurant(r.id));

        list.appendChild(li);
      });
    }

    function renderAll() {
      renderModes();
      renderFilters();
      renderCandidateInfo();
      renderList();
    }

    function showResult(restaurant) {
      const el = document.getElementById("result");
      document.getElementById("resultName").textContent = restaurant.name;
      const tags = [];
      if (restaurant.needsCar) tags.push("차로 이동");
      if (restaurant.isFridayOnly) tags.push("금요일 전용");
      const tagText = tags.length > 0 ? ` · ${tags.join(", ")}` : "";
      document.getElementById("resultMeta").textContent =
        `지금까지 ${restaurant.count}회 방문${tagText} · ${modeLabel(state.mode)} · ${filterSummary()}`;
      el.classList.add("show");
      state.lastPickId = restaurant.id;
    }

    function hideResult() {
      document.getElementById("result").classList.remove("show");
      state.lastPickId = null;
    }

    // ============================================================
    // TOAST / LOADING
    // ============================================================
    function showToast(message, type = "info", duration = 3000) {
      const stack = document.getElementById("toastStack");
      const toast = document.createElement("div");
      toast.className = "toast" + (type === "error" ? " error" : type === "success" ? " success" : "");
      toast.textContent = message;
      stack.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transition = "opacity 0.25s";
        setTimeout(() => toast.remove(), 250);
      }, duration);
    }

    function showLoading(show) {
      document.getElementById("loadingOverlay").classList.toggle("show", !!show);
    }

    // ============================================================
    // ACTIONS (optimistic + API)
    // ============================================================
    function genLocalId() {
      return "r_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    async function addRestaurant(name) {
      const trimmed = name.trim();
      if (!trimmed) return;
      if (state.restaurants.some(r => r.name === trimmed)) {
        alert("이미 같은 이름의 식당이 있습니다.");
        return;
      }
      const tempId = genLocalId();
      const optimistic = normalizeRestaurant({
        id: tempId, name: trimmed, count: 1,
      });
      state.restaurants.push(optimistic);
      renderAll();

      try {
        const saved = await apiPost({ action: "add", restaurant: optimistic });
        const idx = state.restaurants.findIndex(r => r.id === tempId);
        if (idx >= 0) state.restaurants[idx] = normalizeRestaurant(saved);
        renderAll();
        showToast(`'${saved.name}' 추가 완료`, "success");
      } catch (err) {
        state.restaurants = state.restaurants.filter(r => r.id !== tempId);
        renderAll();
        showToast("추가 실패: " + err.message, "error");
      }
    }

    async function renameRestaurant(id, newName) {
      const r = state.restaurants.find(x => x.id === id);
      if (!r) return;
      const trimmed = newName.trim();

      if (!trimmed) {
        alert("이름은 비워둘 수 없습니다.");
        renderList();
        return;
      }
      if (trimmed === r.name) return;
      if (state.restaurants.some(x => x.id !== id && x.name === trimmed)) {
        alert("이미 같은 이름의 식당이 있습니다.");
        renderList();
        return;
      }

      const prev = r.name;
      r.name = trimmed;
      renderAll();

      try {
        await apiPost({ action: "update", id, fields: { name: trimmed } });
      } catch (err) {
        r.name = prev;
        renderAll();
        showToast("이름 변경 실패: " + err.message, "error");
      }
    }

    async function toggleTag(id, tag) {
      const r = state.restaurants.find(x => x.id === id);
      if (!r) return;
      const prev = r[tag];
      r[tag] = !r[tag];
      renderAll();

      try {
        await apiPost({ action: "update", id, fields: { [tag]: r[tag] } });
      } catch (err) {
        r[tag] = prev;
        renderAll();
        showToast("변경 실패: " + err.message, "error");
      }
    }

    async function incrementVisitCount(id) {
      const r = state.restaurants.find(x => x.id === id);
      if (!r) return;
      const prev = r.count;
      r.count = prev + 1;
      renderList();
      renderCandidateInfo();

      try {
        await apiPost({ action: "update", id, fields: { count: r.count } });
      } catch (err) {
        r.count = prev;
        renderList();
        showToast("방문 횟수 변경 실패: " + err.message, "error");
      }
    }

    async function deleteRestaurant(id) {
      const r = state.restaurants.find(x => x.id === id);
      if (!r) return;
      if (!confirm(`'${r.name}' 식당을 삭제할까요?`)) return;

      const prevList = [...state.restaurants];
      state.restaurants = state.restaurants.filter(x => x.id !== id);
      renderAll();

      try {
        await apiPost({ action: "delete", id });
        showToast(`'${r.name}' 삭제 완료`, "success");
      } catch (err) {
        state.restaurants = prevList;
        renderAll();
        showToast("삭제 실패: " + err.message, "error");
      }
    }

    function exportData() {
      const blob = new Blob(
        [JSON.stringify({ restaurants: state.restaurants }, null, 2)],
        { type: "application/json" }
      );
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `lunch-picker-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ============================================================
    // EVENT BINDINGS
    // ============================================================
    document.getElementById("modes").addEventListener("click", e => {
      const btn = e.target.closest(".mode-btn");
      if (!btn) return;
      state.mode = btn.dataset.mode;
      savePrefs();
      renderModes();
    });

    document.getElementById("filters").addEventListener("click", e => {
      const btn = e.target.closest(".filter-chip");
      if (!btn || btn.disabled) return;
      const key = btn.dataset.filter;
      state.filters[key] = !state.filters[key];

      if (key === "allowCar" && !state.filters.allowCar) {
        state.filters.carOnly = false;
      }

      savePrefs();
      renderFilters();
      renderCandidateInfo();
      renderList();
    });

    document.getElementById("pickBtn").addEventListener("click", () => {
      const picked = pickRestaurant();
      if (!picked) {
        alert("현재 조건에 맞는 식당이 없습니다. 필터를 조정하거나 식당을 추가해주세요.");
        return;
      }
      showResult(picked);
    });

    document.getElementById("rerollBtn").addEventListener("click", () => {
      const picked = pickRestaurant();
      if (picked) showResult(picked);
    });

    document.getElementById("acceptBtn").addEventListener("click", async () => {
      if (!state.lastPickId) return;
      const r = state.restaurants.find(x => x.id === state.lastPickId);
      if (!r) return;
      const name = r.name;
      await incrementVisitCount(state.lastPickId);
      hideResult();
      showToast(`'${name}' 방문 +1`, "success");
    });

    document.getElementById("addBtn").addEventListener("click", () => {
      const nameInput = document.getElementById("newName");
      addRestaurant(nameInput.value);
      nameInput.value = "";
      nameInput.focus();
    });

    document.getElementById("newName").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("addBtn").click();
    });

    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("syncBtn").addEventListener("click", () => fetchFromSheet());

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        const stale = !state.lastSyncAt || (Date.now() - state.lastSyncAt) > 60 * 1000;
        if (stale) fetchFromSheet({ showLoader: false });
      }
    });

    // ============================================================
    // INIT
    // ============================================================
    loadPrefs();
    renderAll();
    fetchFromSheet().then(() => startPolling());
  </script>
</body>
